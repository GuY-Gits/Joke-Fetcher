<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Fetcher (API)</title>
    <style>
        /* Modern Dark Theme & Centering */
        body { 
            font-family: 'Inter', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* Glassmorphism Card Effect */
        #joke-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 30px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .setup { font-size: 24px; font-weight: bold; margin-bottom: 20px; line-height: 1.4; }
        
        /* The Punchline with a Pop-In Animation */
        .punchline { 
            font-size: 22px; 
            color: #00d2ff; 
            font-style: italic; 
            opacity: 0; /* Starts invisible */
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Stylish Button */
        button { 
            padding: 15px 40px; 
            font-size: 18px; 
            cursor: pointer; 
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            transition: all 0.2s ease;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0, 210, 255, 0.6); }
        button:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(0, 210, 255, 0.4); }
        button:disabled { background: #555; box-shadow: none; cursor: not-allowed; transform: none; color: #888; }

        /* Sleek Loading/Typing Dots Animation */
        .loader { margin-top: 10px; }
        .loader span {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #00d2ff;
            border-radius: 50%;
            margin: 0 4px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loader span:nth-child(1) { animation-delay: -0.32s; }
        .loader span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="joke-card">
        <div id="joke-content">
            <div class="setup">Ready to fetch?</div>
            <div class="punchline" style="opacity: 1;">Click the button below!</div>
        </div>
    </div>

    <button id="fetch-btn" onclick="getJoke()">Fetch a Joke! 🚀</button>

    <script>
        async function getJoke() {
            const content = document.getElementById('joke-content');
            const btn = document.getElementById('fetch-btn');
            
            // 1. Disable the button so users don't spam it
            btn.disabled = true;
            btn.innerText = "Fetching...";
            
            // 2. Initial Loading state
            content.innerHTML = `
                <div class="setup" style="color: #aaa;">Connecting to server...</div>
                <div class="loader"><span></span><span></span><span></span></div>
            `;

            try {
                // 3. Fetch the data from the API
                const response = await fetch('https://official-joke-api.appspot.com/random_joke');
                const data = await response.json();
                
                // 4. Show the setup, but hide the punchline behind the animated dots
                content.innerHTML = `
                    <div class="setup">${data.setup}</div>
                    <div class="loader"><span></span><span></span><span></span></div>
                `;

                // 5. The "Suspense" Delay (Wait 2.5 seconds)
                await new Promise(resolve => setTimeout(resolve, 2500));

                // 6. Reveal the punchline! (The CSS animation takes over here)
                content.innerHTML = `
                    <div class="setup">${data.setup}</div>
                    <div class="punchline">${data.punchline}</div>
                `;
                
            } catch (error) {
                content.innerHTML = `<div class="setup" style="color: #ff4b4b;">Error fetching data! Check your connection. 🚨</div>`;
            } finally {
                // 7. Re-enable the button no matter what happens
                btn.disabled = false;
                btn.innerText = "Fetch Another! 🚀";
            }
        }
    </script>

</body>
</html>
